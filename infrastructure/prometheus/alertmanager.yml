# ──────────────────────────────────────────────────────────────
# SOTS Platform — Alertmanager Configuration
# ──────────────────────────────────────────────────────────────

global:
  resolve_timeout: 5m
  # smtp_smarthost: 'smtp.example.com:587'
  # smtp_from: 'alertmanager@sots.dev'
  # smtp_auth_username: 'alerts@sots.dev'
  # smtp_auth_password: ''

# ── Inhibition rules ─────────────────────────────────────────
# Suppress warning alerts when a critical alert is already firing
# for the same job/instance.
inhibit_rules:
  - source_matchers:
      - severity = critical
    target_matchers:
      - severity = warning
    equal: ['job', 'instance']

# ── Routing tree ──────────────────────────────────────────────
route:
  receiver: 'default-webhook'
  group_by: ['alertname', 'job']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  routes:
    # Critical alerts: shorter intervals
    - matchers:
        - severity = critical
      receiver: 'critical-webhook'
      group_wait: 10s
      repeat_interval: 1h

    # AI/worker alerts: dedicated channel
    - matchers:
        - alertname =~ "AiDraft.*|BackgroundWorkerStalled"
      receiver: 'workers-webhook'
      group_wait: 30s

# ── Receivers ─────────────────────────────────────────────────
receivers:
  - name: 'default-webhook'
    webhook_configs:
      - url: 'http://host.docker.internal:3000/internal/alerts/webhook'
        send_resolved: true

  - name: 'critical-webhook'
    webhook_configs:
      - url: 'http://host.docker.internal:3000/internal/alerts/webhook'
        send_resolved: true
    # Uncomment to add email notifications:
    # email_configs:
    #   - to: 'ops-team@sots.dev'
    #     send_resolved: true

  - name: 'workers-webhook'
    webhook_configs:
      - url: 'http://host.docker.internal:3000/internal/alerts/webhook'
        send_resolved: true
