global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - 'alert_rules.yml'


scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # SOTS Services — host.docker.internal allows scraping host services from container
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['host.docker.internal:3000']
    metrics_path: /metrics

  - job_name: 'auth-api'
    static_configs:
      - targets: ['host.docker.internal:3013']
    metrics_path: /metrics

  - job_name: 'onboarding-api'
    static_configs:
      - targets: ['host.docker.internal:3006']
    metrics_path: /metrics

  - job_name: 'fdrs-api'
    static_configs:
      - targets: ['host.docker.internal:3008']
    metrics_path: /metrics

  - job_name: 'report-engine'
    static_configs:
      - targets: ['host.docker.internal:3004']
    metrics_path: /metrics

  - job_name: 'session-engine'
    static_configs:
      - targets: ['host.docker.internal:3015']
    metrics_path: /metrics

  - job_name: 'background-workers'
    static_configs:
      - targets: ['host.docker.internal:3020']
    metrics_path: /metrics

  - job_name: 'event-collector'
    static_configs:
      - targets: ['host.docker.internal:3001']
    metrics_path: /metrics

  - job_name: 'graph-engine'
    static_configs:
      - targets: ['host.docker.internal:3002']
    metrics_path: /metrics

  - job_name: 'coverage-engine'
    static_configs:
      - targets: ['host.docker.internal:3003']
    metrics_path: /metrics

  - job_name: 'demonstration-api'
    static_configs:
      - targets: ['host.docker.internal:3005']
    metrics_path: /metrics

  - job_name: 'billing-api'
    static_configs:
      - targets: ['host.docker.internal:3009']
    metrics_path: /metrics

  - job_name: 'usage-tracker'
    static_configs:
      - targets: ['host.docker.internal:3012']
    metrics_path: /metrics
